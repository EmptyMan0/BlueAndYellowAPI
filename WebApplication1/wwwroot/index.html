<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="browser-header">
            <div class="window-controls">
                <div class="control red"></div>
                <div class="control yellow"></div>
                <div class="control green"></div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn">
                    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" /></svg>
                </button>
                <button class="nav-btn">
                    <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z" /></svg>
                </button>
                <button class="nav-btn">
                    <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" /></svg>
                </button>
            </div>
            <div class="address-bar">http://localhost:8000</div>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div class="section">
                    <div class="input-group">
                        <input type="text" id="idInstance" placeholder="idInstance">
                    </div>
                    <div class="input-group">
                        <input type="text" id="apiTokenInstance" placeholder="ApiTokenInstance">
                    </div>
                    <div class="button-group">
                        <button class="btn" onclick="getSettings()">getSettings</button>
                        <button class="btn" onclick="getStateInstance()">getStateInstance</button>
                    </div>
                </div>

                <div class="section">
                    <div class="input-group">
                        <input type="text" id="messagePhone" placeholder="77771234567" disabled>
                    </div>
                    <div class="input-group">
                        <textarea id="messageText" placeholder="Hello World!" disabled></textarea>
                    </div>
                    <div class="button-group">
                        <button class="btn" id="sendMsgBtn" onclick="sendMessage()" disabled>sendMessage</button>
                    </div>
                </div>

                <div class="section">
                    <div class="input-group">
                        <input type="text" id="fileUrlPhone" placeholder="77771234567" disabled>
                    </div>
                    <div class="input-group">
                        <input type="text" id="fileUrl" placeholder="https://mysite.com/my/horse.png" disabled>
                    </div>
                    <div class="input-group">
                        <input type="text" id="fileName" placeholder="horse.png" disabled>
                    </div>
                    <div class="input-group">
                        <input type="text" id="fileCaption" placeholder="Описание файла" disabled>
                    </div>
                    <div class="input-group">
                        <input type="text" id="fileQuotedMessageId" placeholder="3EB0C767C0937B7C7C0930" disabled>
                    </div>
                    <div class="button-group">
                        <button class="btn" id="sendFileUrlBtn" onclick="sendFileByUrl()" disabled>sendFileByUrl</button>
                    </div>
                </div>

                <div id="error-container" class="error-message"></div>
            </div>

            <div class="right-panel">
                <div class="response-title">Ответ:</div>
                <div class="response-box">
                    <pre id="response">{
    "idMessage": "3EB0C767C0937B7C7C0930"
}</pre>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
